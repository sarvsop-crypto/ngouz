<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xabarnomalar - O'zNNTMA Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ds.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>
<div class="ds-frame">

  <aside class="ds-sidebar">
    <div>
      <a class="ds-logo" href="admin-dashboard.html">O'z<span>NNTMA</span></a>
      <nav class="ds-nav">
        <a href="admin-dashboard.html" class="active"><span class="ds-nav-icon"><i class="ph ph-squares-four"></i></span>Boshqaruv</a>
        <a href="admin-membership-requests.html"><span class="ds-nav-icon"><i class="ph ph-file-text"></i></span>A'zolik shartnomalari</a>
        <a href="admin-registry.html"><span class="ds-nav-icon"><i class="ph ph-list-bullets"></i></span>Ro'yxat</a>
        <a href="admin-reports.html"><span class="ds-nav-icon"><i class="ph ph-chart-bar"></i></span>Hisobotlar</a>
        <a href="admin-users.html"><span class="ds-nav-icon"><i class="ph ph-users"></i></span>Foydalanuvchilar</a>
      </nav>
    </div>
    <div class="ds-sidebar-bottom">
      <nav class="ds-nav">
        <a href="admin-settings.html"><span class="ds-nav-icon"><i class="ph ph-gear"></i></span>Sozlamalar</a>
        <a href="#"><span class="ds-nav-icon"><i class="ph ph-question"></i></span>Yordam</a>
      </nav>
    </div>
  </aside>

  <main class="ds-main">

    <div class="ds-header">
      <div>
        <h1>Xabarnomalar</h1>
        <p class="ds-header-sub">Tizim xabarnomalar va ogohlantirishlar</p>
      </div>
      <div class="ds-header-right">
        <div class="ds-search"><i class="ph ph-magnifying-glass"></i> <input placeholder="Qidirish..." /></div>
        <div class="ds-user">
          <div class="ds-avatar">A</div>
          <div><p class="ds-user-name">Admin</p><p class="ds-user-role">Bosh admin</p></div>
        </div>
      </div>
    </div>

    <article class="ds-card">

      <div class="ds-chips">
        <button class="ds-chip active">Barchasi <span class="ds-chip-n">12</span></button>
        <button class="ds-chip">O'qilmagan <span class="ds-chip-n">4</span></button>
        <button class="ds-chip">Muhim <span class="ds-chip-n">3</span></button>
        <button class="ds-chip">Ariza <span class="ds-chip-n">5</span></button>
        <button class="ds-chip">Tizim <span class="ds-chip-n">4</span></button>
      </div>

      <div id="notifStreamContainer" class="ds-stream-list">
        <p class="notif-empty">Yuklanmoqda...</p>
      </div>

      <div style="margin-top:20px;display:flex;gap:10px;">
        <button class="ds-btn" id="sendNotifBtn" style="background:#0e7490;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600">
          <i class="ph ph-paper-plane-tilt"></i> Barcha a'zolarga xabar yuborish
        </button>
      </div>

    </article>

  </main>
</div>
<script src="js/main.js"></script>
<script src="js/api-client.js"></script>
<script src="js/admin-boot.js"></script>
<script>
(function () {
  var container = document.getElementById('notifStreamContainer');
  if (!container) return;

  function loadNotifications() {
    NgoApi.get('/admin/notifications')
      .then(function (data) {
        var items = data.items || [];
        var chips = document.querySelectorAll('.ds-chip .ds-chip-n');
        if (chips[0]) chips[0].textContent = items.length;

        if (!items.length) {
          container.innerHTML = '<p style="padding:16px;color:#798384">Hali xabarnoma yuborilmagan.</p>';
          return;
        }
        var typeIcon = { 'info': 'ph-bell', 'warning': 'ph-warning', 'success': 'ph-check-circle', 'action': 'ph-lightning' };
        var typeBg = { 'info': '#f0f5ff', 'warning': '#fff9f0', 'success': '#f0fdf4', 'action': '#fef2f2' };
        container.innerHTML = items.map(function (n) {
          var bg = typeBg[n.type] || '';
          var icon = typeIcon[n.type] || 'ph-bell';
          var target = n.user_id ? 'Foydalanuvchi #' + n.user_id : (n.organization_id ? 'Tashkilot #' + n.organization_id : 'Barcha a\'zolar');
          return '<div class="ds-stream-item" style="background:' + bg + ';border-radius:10px;margin-bottom:4px;">'
            + '<div class="ds-stream-icon"><i class="ph ' + icon + '"></i></div>'
            + '<div class="ds-stream-body">'
            + '<div class="ds-stream-title">' + (n.title || '') + '</div>'
            + '<div class="ds-stream-meta">' + (n.created_at || '').slice(0,16) + ' · ' + target + '</div>'
            + (n.body ? '<div style="font-size:13px;color:#798384;margin-top:4px">' + n.body.slice(0,100) + '</div>' : '')
            + '</div></div>';
        }).join('');
      });
  }

  document.getElementById('sendNotifBtn').addEventListener('click', function () {
    var title = prompt('Xabar sarlavhasi:');
    if (!title) return;
    var body = prompt('Xabar matni:');
    if (body === null) return;
    var type = prompt('Turi (info/warning/success/action):', 'info') || 'info';

    NgoApi.post('/admin/notifications', { title: title, body: body, type: type })
      .then(function () { alert('Xabar yuborildi!'); loadNotifications(); })
      .catch(function () { alert('Xatolik yuz berdi.'); });
  });

  loadNotifications();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yangi parol — O'zNNTMA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="css/pacta-tokens.css">
  <link rel="stylesheet" href="css/pacta-auth.page.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__logo">N</div>
      <h1 class="header__title">O&rsquo;zNNTMA Admin</h1>
    </header>

    <main class="main">
      <div class="form-card">
        <div class="form-header">
          <div class="form-header__icon-wrap">
            <div class="form-header__icon-inner">
              <i class="ph ph-lock-key" style="font-size:24px;color:var(--primary-500);"></i>
            </div>
          </div>
          <h2 class="form-header__title">Yangi parol yarating</h2>
          <p class="form-header__subtitle">Yangi parolingiz avvalgi parollardan farq qilishi kerak. Boshqa joylarda ishlatmaydigan kuchli parol tanlang.</p>
        </div>

        <form class="form-fields" action="admin-login.html" method="get" id="newPasswordForm">
          <div class="field">
            <label class="field__label" for="password">Yangi parol <span>*</span></label>
            <div class="field__input-wrap">
              <input type="password" id="password" class="field__input" name="password" placeholder="Yangi parolni kiriting" required minlength="8" autocomplete="new-password" />
              <button type="button" class="field__toggle" id="togglePassword" aria-label="Parolni ko'rsatish">
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="confirm">Parolni tasdiqlang <span>*</span></label>
            <div class="field__input-wrap">
              <input type="password" id="confirm" class="field__input" name="confirm" placeholder="Parolni qayta kiriting" required minlength="8" autocomplete="new-password" />
              <button type="button" class="field__toggle" id="toggleConfirm" aria-label="Parolni ko'rsatish">
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-auth">
            <i class="ph ph-lock-simple-open"></i> Parolni yangilash
          </button>
        </form>
      </div>
    </main>

  </div>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 O&rsquo;zNNTMA. Barcha huquqlar himoyalangan.</p>
    <nav class="footer__links">
      <a href="mailto:info@ngo.uz" class="footer__link"><i class="ph ph-envelope"></i> info@ngo.uz</a>
      <a href="#" class="footer__link"><i class="ph ph-shield"></i> Maxfiylik</a>
      <a href="#" class="footer__link"><i class="ph ph-file-text"></i> Shartlar</a>
      <a href="#" class="footer__link"><i class="ph ph-question"></i> Yordam</a>
    </nav>
  </footer>

  <script>
    (function () {
      function setupToggle(btnId, inputId) {
        var btn = document.getElementById(btnId);
        var inp = document.getElementById(inputId);
        if (!btn || !inp) return;
        btn.addEventListener('click', function () {
          var icon = this.querySelector('i');
          if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'ph ph-eye-slash';
          } else {
            inp.type = 'password';
            icon.className = 'ph ph-eye';
          }
        });
      }
      setupToggle('togglePassword', 'password');
      setupToggle('toggleConfirm', 'confirm');

      document.getElementById('newPasswordForm').addEventListener('submit', function (e) {
        if (document.getElementById('password').value !== document.getElementById('confirm').value) {
          e.preventDefault();
          alert('Parollar mos kelmadi.');
        }
      });
    })();
  </script>
</body>
</html>

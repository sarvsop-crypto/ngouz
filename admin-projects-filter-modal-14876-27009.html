<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figma Node 14876:27009 - Filter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --line: #dfdfdf;
      --text: #060c13;
      --muted: #a1a1a1;
      --primary: #383bfe;
      --bg: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f2f2f2;
      font-family: "Open Sans", sans-serif;
      color: var(--text);
    }
    .modal {
      width: 400px;
      min-height: 542px;
      background: var(--bg);
      border-radius: 32px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .title {
      margin: 0;
      font-size: 35px;
      line-height: 1.5;
      letter-spacing: -0.4px;
      font-weight: 700;
    }
    .close {
      width: 24px;
      height: 24px;
      border: 1px solid #444;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
    }
    .search {
      border: 1px solid var(--line);
      border-radius: 12px;
      height: 40px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: -0.28px;
      line-height: 1.4;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: -0.28px;
      line-height: 1.4;
    }
    .input {
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      letter-spacing: -0.32px;
      line-height: 1.5;
    }
    .status { display: flex; flex-direction: column; gap: 4px; }
    .status label {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: -0.28px;
      line-height: 1.4;
    }
    .radios {
      height: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 16px;
      letter-spacing: -0.32px;
      line-height: 1.5;
    }
    .radio { display: inline-flex; align-items: center; gap: 4px; }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid #c8c8c8;
      display: inline-grid;
      place-items: center;
    }
    .dot.active { border-color: var(--primary); }
    .dot.active::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      display: block;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: auto;
    }
    .btn {
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font: 400 14px/1.4 "Open Sans", sans-serif;
      letter-spacing: -0.28px;
      color: var(--text);
    }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  </style>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>
  <main class="modal" data-node-id="14876:27009">
    <section class="header">
      <h1 class="title">Filter</h1>
      <div class="close">×</div>
    </section>

    <div class="search"><i class="ph ph-magnifying-glass"></i> Search</div>

    <section class="field">
      <label>Project Name</label>
      <div class="input">Parcel Delivery Dashboard Design <span>▾</span></div>
    </section>

    <section class="field">
      <label>Category</label>
      <div class="input">UI/UX Design <span>▾</span></div>
    </section>

    <section class="field">
      <label>Type</label>
      <div class="input">Dashboard Design <span>▾</span></div>
    </section>

    <section class="status">
      <label>Status</label>
      <div class="radios">
        <span class="radio"><span class="dot active"></span>In Progress</span>
        <span class="radio"><span class="dot"></span>Completed</span>
      </div>
    </section>

    <section class="actions">
      <button class="btn">Cancel</button>
      <button class="btn primary">Apply Filter</button>
    </section>
  </main>
</body>
</html>

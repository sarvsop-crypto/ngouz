<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish — O'zNNTMA Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-auth.page.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__logo">N</div>
      <h1 class="header__title">O&rsquo;zNNTMA</h1>
    </header>

    <main class="main">
      <div class="form-card">
        <div class="form-header">
          <div class="form-header__icon-wrap">
            <div class="form-header__icon-inner">
              <i class="ph ph-lock-open" style="font-size:24px;color:var(--primary-500);"></i>
            </div>
          </div>
          <h2 class="form-header__title">Xush kelibsiz</h2>
          <p class="form-header__subtitle">Shaxsiy kabinetga kirish uchun ma&rsquo;lumotlaringizni kiriting.</p>
        </div>

        <form class="form-fields" id="loginForm" novalidate>
          <div class="field">
            <label class="field__label" for="email">Telefon raqam <span>*</span></label>
            <div class="field__input-wrap">
              <input type="tel" id="email" class="field__input" name="email" placeholder="+998 __ ___ __ __" required autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="password">Parol <span>*</span></label>
            <div class="field__input-wrap">
              <input type="password" id="password" class="field__input" name="password" placeholder="Parolingizni kiriting" required autocomplete="current-password" />
              <button type="button" class="field__toggle" id="togglePassword" aria-label="Parolni ko'rsatish">
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-wrap">
              <input type="checkbox" name="remember" />
              <span>Tizimda qolish</span>
            </label>
            <a href="cabinet-forgot-password-request.html" class="form-options__forgot">Parolni unutdingizmi?</a>
          </div>

          <button type="submit" class="btn-auth">
            <i class="ph ph-sign-in"></i> Kirish
          </button>
        </form>

        <p class="form-alt">Hisobingiz yo&rsquo;qmi? <a href="cabinet-register.html">Ro&rsquo;yxatdan o&rsquo;tish</a></p>
      </div>
    </main>

  </div>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 O&rsquo;zNNTMA. Barcha huquqlar himoyalangan.</p>
    <nav class="footer__links">
      <a href="mailto:info@ngo.uz" class="footer__link"><i class="ph ph-envelope"></i> info@ngo.uz</a>
      <a href="#" class="footer__link"><i class="ph ph-shield"></i> Maxfiylik</a>
      <a href="#" class="footer__link"><i class="ph ph-file-text"></i> Shartlar</a>
      <a href="#" class="footer__link"><i class="ph ph-question"></i> Yordam</a>
    </nav>
  </footer>

  <script src="../js/api-client.js"></script>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      var inp = document.getElementById('password');
      var icon = this.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'ph ph-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'ph ph-eye'; }
    });

    if (NgoApi.getToken()) {
      location.replace('cabinet-dashboard.html');
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var phone = document.getElementById('email').value.replace(/[^\d]/g, '');
      var email = phone + '@phone.ngo.uz';
      var pass  = document.getElementById('password').value;
      var btn   = this.querySelector('button[type="submit"]');
      if (!phone || !pass) return;
      btn.disabled = true;
      NgoApi.login(email, pass).then(function () {
        location.replace('cabinet-dashboard.html');
      }).catch(function (err) {
        btn.disabled = false;
        var msg = 'Kirish xatosi';
        if (err && err.code === 'invalid_credentials') msg = "Email yoki parol noto'g'ri";
        if (err && err.code === 'too_many_attempts') msg = "Juda ko'p urinish. 15 daqiqadan so'ng qayta urining";
        alert(msg);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bildirishnomalar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-approvals.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
  <style>
    .notif-list{display:flex;flex-direction:column;gap:4px;}
    .notif-item{display:flex;gap:14px;align-items:flex-start;padding:16px 18px;background:var(--grey-0);border:1px solid var(--grey-100);border-radius:10px;transition:background .12s;}
    .notif-item:hover{background:var(--grey-50);}
    .notif-item--unread{background:var(--primary-50);border-color:var(--primary-100);}
    .notif-item--unread:hover{background:#dbeafe;}
    .notif-icon{width:40px;height:40px;border-radius:10px;background:var(--primary-100);color:var(--primary-600);display:grid;place-items:center;font-size:18px;flex-shrink:0;}
    .notif-icon--warning{background:var(--secondary-50);color:var(--warning-600);}
    .notif-icon--success{background:#dcfce7;color:#16a34a;}
    .notif-icon--error{background:#fee2e2;color:var(--error-600);}
    .notif-icon--system{background:var(--grey-100);color:var(--grey-500);}
    .notif-item__content{flex:1;}
    .notif-item__title{font-size:14px;font-weight:600;color:var(--grey-900);margin:0 0 3px;}
    .notif-item__body{font-size:13px;color:var(--grey-600);margin:0 0 5px;}
    .notif-item__time{font-size:12px;color:var(--grey-400);}
    .notif-item__dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary-500);vertical-align:middle;margin-left:4px;}
    .notif-tabs{margin-bottom:20px;}
  </style>
</head>
<body data-nav-active="notifications">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Bildirishnomalar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial">K</div>
            <div>
              <div class="main__profile-name">Kamolov Sanjar</div>
              <div class="main__profile-role">Yangi Nafas NNT</div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Bildirishnomalar</h1>
        <div class="main__btns">
          <button type="button" class="btn btn--secondary"><i class="ph ph-checks"></i> Barchasini o&rsquo;qildi deb belgilash</button>
        </div>
      </div>

      <div class="tabs notif-tabs">
        <button type="button" class="tab is-active">Hammasi <span class="tab__count">8</span></button>
        <button type="button" class="tab">O&rsquo;qilmagan <span class="tab__count">3</span></button>
        <button type="button" class="tab">Tizim <span class="tab__count">2</span></button>
      </div>

      <div class="notif-list" id="notifList">
        <div style="text-align:center;color:var(--grey-400);padding:32px;">Yuklanmoqda...</div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var typeIcons = {
      warning:  { icon: 'ph-file-text',        cls: 'notif-icon--warning' },
      info:     { icon: 'ph-magnifying-glass',  cls: '' },
      success:  { icon: 'ph-check-circle',      cls: 'notif-icon--success' },
      event:    { icon: 'ph-calendar',          cls: '' },
      error:    { icon: 'ph-x-circle',          cls: 'notif-icon--error' },
      grant:    { icon: 'ph-trophy',            cls: 'notif-icon--success' },
      system:   { icon: 'ph-gear',              cls: 'notif-icon--system' },
      security: { icon: 'ph-lock',              cls: 'notif-icon--system' }
    };

    function fmtDateTime(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2) + '.' + d.getFullYear()
        + ' \u00b7 ' + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }

    function renderNotif(n) {
      var t = typeIcons[n.type] || typeIcons.info;
      var unread = n.is_read ? '' : ' notif-item--unread';
      var dot = n.is_read ? '' : ' <span class="notif-item__dot"></span>';
      return '<div class="notif-item' + unread + '" data-notif-id="' + n.id + '">'
        + '<div class="notif-icon ' + t.cls + '"><i class="ph ' + t.icon + '"></i></div>'
        + '<div class="notif-item__content">'
        + '<div class="notif-item__title">' + (n.title || '') + dot + '</div>'
        + '<div class="notif-item__body">' + (n.body || '') + '</div>'
        + '<div class="notif-item__time">' + fmtDateTime(n.created_at) + '</div>'
        + '</div></div>';
    }

    var allItems = [];

    function renderList(filter) {
      var list = document.getElementById('notifList');
      var filtered = allItems;
      if (filter === 'unread') filtered = allItems.filter(function (n) { return !n.is_read; });
      else if (filter === 'system') filtered = allItems.filter(function (n) { return n.type === 'system' || n.type === 'security'; });
      if (!filtered.length) {
        list.innerHTML = '<div style="text-align:center;color:var(--grey-400);padding:32px;">Bildirishnomalar topilmadi</div>';
        return;
      }
      list.innerHTML = filtered.map(renderNotif).join('');

      // Click to mark individual as read
      list.querySelectorAll('.notif-item--unread').forEach(function (el) {
        el.addEventListener('click', function () {
          var id = el.getAttribute('data-notif-id');
          NgoApi.post('/cabinet/notifications/' + id + '/mark-read', {}, { loginPage: 'cabinet-login.html' }).then(function () {
            el.classList.remove('notif-item--unread');
            var dot = el.querySelector('.notif-item__dot');
            if (dot) dot.remove();
            var item = allItems.find(function (n) { return String(n.id) === String(id); });
            if (item) item.is_read = true;
            updateCounts();
          }).catch(function () {});
        });
      });
    }

    function updateCounts() {
      var tabs = document.querySelectorAll('.tab .tab__count');
      var unreadCount = allItems.filter(function (n) { return !n.is_read; }).length;
      var systemCount = allItems.filter(function (n) { return n.type === 'system' || n.type === 'security'; }).length;
      if (tabs[0]) tabs[0].textContent = allItems.length;
      if (tabs[1]) tabs[1].textContent = unreadCount;
      if (tabs[2]) tabs[2].textContent = systemCount;
    }

    NgoApi.get('/cabinet/notifications', { loginPage: 'cabinet-login.html' }).then(function (res) {
      allItems = res.items || [];
      updateCounts();
      renderList('all');
    }).catch(function (err) {
      console.error('Notifications load error:', err);
      document.getElementById('notifList').innerHTML = '<div style="text-align:center;color:var(--error-500);padding:32px;">Xatolik: ' + (err.message || 'Nomalum') + '</div>';
    });

    // Tab switching
    var tabs = document.querySelectorAll('.notif-tabs .tab');
    var filters = ['all', 'unread', 'system'];
    tabs.forEach(function (tab, i) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) { t.classList.remove('is-active'); });
        tab.classList.add('is-active');
        renderList(filters[i]);
      });
    });

    // Mark all as read button
    var markAllBtn = document.querySelector('.main__btns .btn--secondary');
    if (markAllBtn) {
      markAllBtn.addEventListener('click', function () {
        NgoApi.post('/cabinet/notifications/mark-read', {}, { loginPage: 'cabinet-login.html' }).then(function () {
          allItems.forEach(function (n) { n.is_read = true; });
          updateCounts();
          renderList('all');
        }).catch(function (err) {
          alert('Xatolik: ' + (err.message || 'Nomalum'));
        });
      });
    }
  })();
  </script>
</body>
</html>

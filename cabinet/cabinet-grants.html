<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grantlar va loyihalar boshqaruvi — O'zNNTMA Boshqaruv Tizimi</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
  <style>
    .two-col {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .form-panel {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--navy-panel);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-sm);
      color: #fff;
      font: inherit;
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--text-dim); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select { appearance: none; cursor: pointer; }

    .form-body { padding: 20px; }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .btn-publish {
      background: var(--accent);
      color: #050f1e;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 10px 22px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-publish:hover:not(:disabled) { background: #00d4ff; }
    .btn-publish:disabled { opacity: .55; cursor: not-allowed; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--navy-border);
      color: var(--text-muted);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-cancel:hover { border-color: rgba(0,180,216,.4); color: var(--text); }

    .status-msg {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
    }
    .status-msg.ok  { background: var(--ok-bg);  color: var(--ok);  border: 1px solid rgba(34,201,122,.25); display: block; }
    .status-msg.err { background: var(--bad-bg); color: var(--bad); border: 1px solid rgba(240,82,82,.25);  display: block; }

    .token-warn {
      background: var(--warn-bg);
      border: 1px solid rgba(245,166,35,.3);
      color: var(--warn);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
    }
    .token-warn a { color: var(--warn); text-decoration: underline; }

    .list-panel {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: fadeUp .4s ease both;
      animation-delay: .08s;
    }

    .list-body { min-height: 80px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0,180,216,.07);
    }
    .list-item:last-child { border-bottom: 0; }
    .list-item-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .list-item-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }
    .badge-cat {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent-dim);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-del {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 15px;
      border-radius: var(--radius-sm);
      padding: 4px 7px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
      line-height: 1;
    }
    .btn-del:hover {
      background: var(--bad-bg);
      color: var(--bad);
      border-color: rgba(240,82,82,.3);
    }

    .list-empty {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    .list-spinner {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) {
      .fields-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <main class="main">

    <div class="page-heading">
      <h1>Grantlar va <span>loyihalar</span> boshqaruvi</h1>
    </div>

    <div id="tokenWarn" style="display:none">
      <div class="token-warn">
        GitHub tokeni topilmadi. Nashr qilish uchun avval
        <a href="cabinet-settings.html">sozlamalarga</a> kiring va tokenni saqlang.
      </div>
    </div>

    <div class="two-col">

      <!-- LEFT: form -->
      <div class="form-panel panel">
        <div class="panel-head">
          <div class="panel-title">
            <ph-trophy class="icon" weight="duotone"></ph-trophy>
            Yangi grant qo'shish
          </div>
        </div>
        <div class="form-body">
          <div class="fields-row">
            <div class="field">
              <label>Holati</label>
              <select id="fStatus">
                <option value="active">Faol</option>
                <option value="closed">Yopilgan</option>
              </select>
            </div>
            <div class="field">
              <label>Kategoriya</label>
              <input type="text" id="fCategory" placeholder="Ta'lim" />
            </div>
          </div>
          <div class="field">
            <label>Sarlavha *</label>
            <input type="text" id="fTitle" placeholder="Grant nomi" required />
          </div>
          <div class="field">
            <label>Tavsif</label>
            <textarea id="fDescription" rows="3" placeholder="Grant haqida qisqacha…"></textarea>
          </div>
          <div class="fields-row">
            <div class="field">
              <label>Tashkilotchi</label>
              <input type="text" id="fOrganizer" placeholder="Tashkilot nomi" />
            </div>
            <div class="field">
              <label>Miqdor</label>
              <input type="text" id="fAmount" placeholder="2 300 000 so'm" />
            </div>
          </div>
          <div class="fields-row">
            <div class="field">
              <label>Muddat <span style="font-weight:400;text-transform:none">(ixtiyoriy)</span></label>
              <input type="date" id="fDeadline" />
            </div>
            <div class="field">
              <label>Muddat yorlig'i</label>
              <input type="text" id="fDeadlineLabel" placeholder="18 aprel 2026" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-publish" type="button" id="publishBtn">Nashr etish</button>
            <button class="btn-cancel" type="button" id="cancelBtn">Bekor qilish</button>
          </div>
          <div class="status-msg" id="statusMsg"></div>
        </div>
      </div>

      <!-- RIGHT: existing items -->
      <div class="list-panel panel">
        <div class="panel-head">
          <div class="panel-title">
            <ph-clipboard-text class="icon" weight="duotone"></ph-clipboard-text>
            Mavjud grantlar
          </div>
          <button class="panel-action" type="button" id="refreshBtn">Yangilash</button>
        </div>
        <div class="list-body" id="listBody">
          <div class="list-spinner" id="listSpinner">Yuklanmoqda…</div>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="js/cabinet-app.js"></script>
<script src="js/github-api.js"></script>
<script>
(function () {
  if (!localStorage.getItem('gh_token')) {
    document.getElementById('tokenWarn').style.display = 'block';
  }

  var publishBtn = document.getElementById('publishBtn');
  var cancelBtn  = document.getElementById('cancelBtn');
  var statusMsg  = document.getElementById('statusMsg');

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + type;
    statusMsg.style.display = 'block';
  }

  function clearForm() {
    document.getElementById('fStatus').value = 'active';
    document.getElementById('fCategory').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDescription').value = '';
    document.getElementById('fOrganizer').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fDeadline').value = '';
    document.getElementById('fDeadlineLabel').value = '';
    statusMsg.style.display = 'none';
    statusMsg.className = 'status-msg';
  }

  cancelBtn.addEventListener('click', clearForm);

  publishBtn.addEventListener('click', function () {
    var title = document.getElementById('fTitle').value.trim();
    if (!title) { showStatus('Sarlavha kiritish majburiy.', 'err'); return; }

    var item = {
      id:            'grant-' + Date.now(),
      status:        document.getElementById('fStatus').value,
      category:      document.getElementById('fCategory').value.trim(),
      title:         title,
      description:   document.getElementById('fDescription').value.trim(),
      organizer:     document.getElementById('fOrganizer').value.trim(),
      amount:        document.getElementById('fAmount').value.trim(),
      deadline:      document.getElementById('fDeadline').value,
      deadlineLabel: document.getElementById('fDeadlineLabel').value.trim()
    };

    publishBtn.disabled = true;
    publishBtn.textContent = 'Saqlanmoqda…';
    statusMsg.style.display = 'none';

    GH.prependItem('grants', item, 'content: add grant ' + title)
      .then(function () {
        showStatus('Grant muvaffaqiyatli nashr etildi!', 'ok');
        clearForm();
        loadList();
      })
      .catch(function (err) {
        showStatus('Xatolik: ' + (err.message || err), 'err');
      })
      .finally(function () {
        publishBtn.disabled = false;
        publishBtn.textContent = 'Nashr etish';
      });
  });

  function loadList() {
    var body = document.getElementById('listBody');
    body.innerHTML = '<div class="list-spinner">Yuklanmoqda…</div>';

    GH.readFile('data/grants.json')
      .then(function (res) {
        var items = res.content;
        if (!items || items.length === 0) {
          body.innerHTML = '<div class="list-empty">Hali hech narsa yo\'q.</div>';
          return;
        }
        body.innerHTML = '';
        items.forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'list-item';

          var statusBadge = document.createElement('span');
          statusBadge.className = 'badge ' + (item.status === 'active' ? 'ok' : 'bad');
          statusBadge.textContent = item.status === 'active' ? 'Faol' : 'Yopilgan';

          var catEl = document.createElement('span');
          catEl.className = 'badge-cat';
          catEl.textContent = item.category || 'Boshqa';

          var titleEl = document.createElement('span');
          titleEl.className = 'list-item-title';
          titleEl.title = item.title || '';
          titleEl.textContent = item.title || '(sarlavsiz)';

          var meta = document.createElement('div');
          meta.className = 'list-item-meta';
          meta.appendChild(statusBadge);
          meta.appendChild(catEl);
          meta.appendChild(titleEl);

          var delBtn = document.createElement('button');
          delBtn.className = 'btn-del';
          delBtn.title = 'O\'chirish';
          delBtn.innerHTML = '<ph-trash weight="bold"></ph-trash>';
          delBtn.addEventListener('click', function () {
            if (!confirm('"' + item.title + '" ni o\'chirishni tasdiqlaysizmi?')) return;
            delBtn.disabled = true;
            delBtn.textContent = '…';
            GH.removeItem('grants', item.id, 'content: remove grant ' + item.id)
              .then(function () { loadList(); })
              .catch(function (err) { alert('Xatolik: ' + (err.message || err)); delBtn.disabled = false; delBtn.textContent = '🗑'; });
          });

          row.appendChild(meta);
          row.appendChild(delBtn);
          body.appendChild(row);
        });
      })
      .catch(function (err) {
        body.innerHTML = '<div class="list-empty">Yuklashda xatolik: ' + (err.message || err) + '</div>';
      });
  }

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  loadList();
})();
</script>
</body>
</html>

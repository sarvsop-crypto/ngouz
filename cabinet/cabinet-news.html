<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yangiliklar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-dashboard.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
  <style>
    .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
    .news-card{background:var(--grey-0);border:1px solid var(--grey-100);border-radius:12px;overflow:hidden;transition:box-shadow .15s;}
    .news-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .news-card__img{height:140px;background:linear-gradient(135deg,var(--primary-100) 0%,var(--primary-200) 100%);display:grid;place-items:center;font-size:40px;color:var(--primary-400);}
    .news-card__body{padding:16px;}
    .news-card__cat{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em;}
    .news-card__cat--news{background:var(--primary-50);color:var(--primary-600);}
    .news-card__cat--event{background:var(--secondary-50);color:var(--warning-700);}
    .news-card__cat--important{background:#fef9c3;color:#92400e;}
    .news-card__cat--grant{background:#dcfce7;color:#15803d;}
    .news-card__title{font-size:14px;font-weight:600;color:var(--grey-900);margin:0 0 8px;line-height:1.4;}
    .news-card__excerpt{font-size:13px;color:var(--grey-500);margin:0 0 12px;line-height:1.5;}
    .news-card__footer{display:flex;align-items:center;justify-content:space-between;}
    .news-card__date{font-size:12px;color:var(--grey-400);}
    .news-card__link{font-size:13px;color:var(--primary-500);text-decoration:none;}
    .news-card__img--event{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);color:#d97706;}
    .news-card__img--grant{background:linear-gradient(135deg,#dcfce7 0%,#bbf7d0 100%);color:#16a34a;}
    .news-card__img--partner{background:linear-gradient(135deg,#ede9fe 0%,#ddd6fe 100%);color:#7c3aed;}
    .news-card__img--urgent{background:linear-gradient(135deg,#fce7f3 0%,#fbcfe8 100%);color:#be185d;}
    .news-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  </style>
</head>
<body data-nav-active="news">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Yangiliklar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial">K</div>
            <div>
              <div class="main__profile-name">Kamolov Sanjar</div>
              <div class="main__profile-role">Yangi Nafas NNT</div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Yangiliklar</h1>
      </div>

      <div class="news-filters">
        <button type="button" class="filter-chip is-active">Hammasi</button>
        <button type="button" class="filter-chip">Yangiliklar</button>
        <button type="button" class="filter-chip">E&rsquo;lonlar</button>
        <button type="button" class="filter-chip">Tadbirlar</button>
        <button type="button" class="filter-chip">Grantlar</button>
      </div>

      <div class="news-grid" id="newsGrid">
        <div style="grid-column:1/-1;text-align:center;color:var(--grey-400);padding:40px 0;">Yuklanmoqda...</div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var API = 'https://ngo-api-proxy.sarvsop.workers.dev/v1';
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(d) { if (!d) return ''; var p = d.slice(0,10).split('-'); return p[2] + '.' + p[1] + '.' + p[0]; }

    var iconMap  = { 'news': 'ph-newspaper', 'event': 'ph-calendar', 'grant': 'ph-trophy', 'announcement': 'ph-megaphone', 'default': 'ph-file-text' };
    var imgClass = { 'event': 'news-card__img--event', 'grant': 'news-card__img--grant', 'partner': 'news-card__img--partner', 'urgent': 'news-card__img--urgent' };
    var catClass = { 'news': 'news-card__cat--news', 'event': 'news-card__cat--event', 'grant': 'news-card__cat--grant', 'announcement': 'news-card__cat--important', 'important': 'news-card__cat--important' };
    var catLabel = { 'news': 'YANGILIK', 'event': 'TADBIR', 'grant': 'GRANT', 'announcement': 'MUHIM', 'important': 'MUHIM' };

    fetch(API + '/public/news?limit=100')
      .then(function (r) { return r.json(); })
      .then(function (res) {
        var items = res.items || res.data || [];
        var grid = document.getElementById('newsGrid');
        if (!items.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--grey-400);padding:40px 0;">Yangilik topilmadi</div>';
          return;
        }
        grid.innerHTML = items.map(function (n) {
          var cat = (n.category || n.type || 'news').toLowerCase();
          var icon = iconMap[cat] || iconMap['default'];
          var img  = imgClass[cat] || '';
          var cc   = catClass[cat] || 'news-card__cat--news';
          var cl   = catLabel[cat] || cat.toUpperCase();
          var excerpt = esc(n.excerpt || n.summary || (n.body || '').slice(0, 120));
          return '<div class="news-card">' +
            '<div class="news-card__img ' + img + '"><i class="ph ' + icon + '"></i></div>' +
            '<div class="news-card__body">' +
              '<span class="news-card__cat ' + cc + '">' + cl + '</span>' +
              '<h3 class="news-card__title">' + esc(n.title) + '</h3>' +
              '<p class="news-card__excerpt">' + excerpt + '</p>' +
              '<div class="news-card__footer"><span class="news-card__date">' + fmtDate(n.published_at || n.created_at) + '</span><a href="#" class="news-card__link">Batafsil <i class="ph ph-arrow-right"></i></a></div>' +
            '</div></div>';
        }).join('');
      })
      .catch(function (err) {
        console.error('News fetch error:', err);
        document.getElementById('newsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--error-600);padding:40px 0;">Xatolik yuz berdi</div>';
      });
  })();
  </script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>
</body>
</html>

<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yangiliklar boshqaruvi — O'zNNTMA Boshqaruv Tizimi</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
  <style>
    .two-col {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* Form panel */
    .form-panel {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--navy-panel);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-sm);
      color: #fff;
      font: inherit;
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--text-dim); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select { appearance: none; cursor: pointer; }

    .field-check {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .field-check input[type="checkbox"] {
      width: 17px; height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .field-check label {
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .form-body { padding: 20px; }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .btn-publish {
      background: var(--accent);
      color: #050f1e;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 10px 22px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-publish:hover:not(:disabled) { background: #00d4ff; }
    .btn-publish:disabled { opacity: .55; cursor: not-allowed; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--navy-border);
      color: var(--text-muted);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-cancel:hover { border-color: rgba(0,180,216,.4); color: var(--text); }

    .status-msg {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
    }
    .status-msg.ok  { background: var(--ok-bg);  color: var(--ok);  border: 1px solid rgba(34,201,122,.25); display: block; }
    .status-msg.err { background: var(--bad-bg); color: var(--bad); border: 1px solid rgba(240,82,82,.25);  display: block; }

    /* Token warning */
    .token-warn {
      background: var(--warn-bg);
      border: 1px solid rgba(245,166,35,.3);
      color: var(--warn);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
    }
    .token-warn a { color: var(--warn); text-decoration: underline; }

    /* List panel */
    .list-panel {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: fadeUp .4s ease both;
      animation-delay: .08s;
    }

    .list-body { min-height: 80px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0,180,216,.07);
    }
    .list-item:last-child { border-bottom: 0; }
    .list-item-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .list-item-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .date-chip-sm {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--navy-panel);
      border: 1px solid var(--navy-border);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-cat {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent-dim);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-del {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 15px;
      border-radius: var(--radius-sm);
      padding: 4px 7px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
      line-height: 1;
    }
    .btn-del:hover {
      background: var(--bad-bg);
      color: var(--bad);
      border-color: rgba(240,82,82,.3);
    }

    .list-empty {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    .list-spinner {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="app">
  <main class="main">

    <div class="page-heading">
      <h1>Yangiliklar <span>boshqaruvi</span></h1>
    </div>

    <div id="tokenWarn" style="display:none">
      <div class="token-warn">
        GitHub tokeni topilmadi. Nashr qilish uchun avval
        <a href="cabinet-settings.html">sozlamalarga</a> kiring va tokenni saqlang.
      </div>
    </div>

    <div class="two-col">

      <!-- LEFT: form -->
      <div class="form-panel panel">
        <div class="panel-head">
          <div class="panel-title">
            <ph-pencil-simple class="icon" weight="duotone"></ph-pencil-simple>
            Yangi yangilik qo'shish
          </div>
        </div>
        <div class="form-body">
          <div class="field">
            <label>Kategoriya</label>
            <input type="text" id="fCategory" placeholder="E'LON" />
          </div>
          <div class="field">
            <label>Sarlavha *</label>
            <input type="text" id="fTitle" placeholder="Yangilik sarlavhasi" required />
          </div>
          <div class="field">
            <label>Qisqacha mazmun</label>
            <textarea id="fExcerpt" rows="3" placeholder="Yangilik haqida qisqacha…"></textarea>
          </div>
          <div class="field">
            <label>Sana</label>
            <input type="date" id="fDate" />
          </div>
          <div class="field-check">
            <input type="checkbox" id="fFeatured" />
            <label for="fFeatured">Bosh sahifada asosiy ko'rsatish</label>
          </div>
          <div class="form-actions">
            <button class="btn-publish" type="button" id="publishBtn">Nashr etish</button>
            <button class="btn-cancel" type="button" id="cancelBtn">Bekor qilish</button>
          </div>
          <div class="status-msg" id="statusMsg"></div>
        </div>
      </div>

      <!-- RIGHT: existing items -->
      <div class="list-panel panel">
        <div class="panel-head">
          <div class="panel-title">
            <ph-clipboard-text class="icon" weight="duotone"></ph-clipboard-text>
            Mavjud yangiliklar
          </div>
          <button class="panel-action" type="button" id="refreshBtn">Yangilash</button>
        </div>
        <div class="list-body" id="listBody">
          <div class="list-spinner" id="listSpinner">Yuklanmoqda…</div>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="js/cabinet-app.js"></script>
<script src="js/github-api.js"></script>
<script>
(function () {
  // Token check
  if (!localStorage.getItem('gh_token')) {
    document.getElementById('tokenWarn').style.display = 'block';
  }

  // Set default date to today
  var today = new Date().toISOString().slice(0, 10);
  document.getElementById('fDate').value = today;

  var publishBtn = document.getElementById('publishBtn');
  var cancelBtn  = document.getElementById('cancelBtn');
  var statusMsg  = document.getElementById('statusMsg');

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + type;
    statusMsg.style.display = 'block';
  }

  function clearForm() {
    document.getElementById('fCategory').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fExcerpt').value = '';
    document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('fFeatured').checked = false;
    statusMsg.style.display = 'none';
    statusMsg.className = 'status-msg';
  }

  cancelBtn.addEventListener('click', clearForm);

  publishBtn.addEventListener('click', function () {
    var title   = document.getElementById('fTitle').value.trim();
    if (!title) {
      showStatus('Sarlavha kiritish majburiy.', 'err');
      return;
    }
    var category = document.getElementById('fCategory').value.trim() || 'XABAR';
    var excerpt  = document.getElementById('fExcerpt').value.trim();
    var date     = document.getElementById('fDate').value || today;
    var featured = document.getElementById('fFeatured').checked;

    var item = {
      id:       'news-' + Date.now(),
      date:     date,
      category: category,
      title:    title,
      excerpt:  excerpt,
      body:     excerpt,
      featured: featured
    };

    publishBtn.disabled = true;
    publishBtn.textContent = 'Saqlanmoqda…';
    statusMsg.style.display = 'none';

    GH.prependItem('news', item, 'content: add news ' + title)
      .then(function () {
        showStatus('Yangilik muvaffaqiyatli nashr etildi!', 'ok');
        clearForm();
        loadList();
      })
      .catch(function (err) {
        showStatus('Xatolik: ' + (err.message || err), 'err');
      })
      .finally(function () {
        publishBtn.disabled = false;
        publishBtn.textContent = 'Nashr etish';
      });
  });

  function loadList() {
    var body = document.getElementById('listBody');
    body.innerHTML = '<div class="list-spinner">Yuklanmoqda…</div>';

    GH.readFile('data/news.json')
      .then(function (res) {
        var items = res.content;
        if (!items || items.length === 0) {
          body.innerHTML = '<div class="list-empty">Hali hech narsa yo\'q.</div>';
          return;
        }
        body.innerHTML = '';
        items.forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'list-item';

          var dateChip = document.createElement('span');
          dateChip.className = 'date-chip-sm';
          dateChip.textContent = item.date || '—';

          var cat = document.createElement('span');
          cat.className = 'badge-cat';
          cat.textContent = item.category || 'XABAR';

          var titleEl = document.createElement('span');
          titleEl.className = 'list-item-title';
          titleEl.title = item.title || '';
          titleEl.textContent = item.title || '(sarlavsiz)';

          var meta = document.createElement('div');
          meta.className = 'list-item-meta';
          meta.appendChild(dateChip);
          meta.appendChild(cat);
          meta.appendChild(titleEl);

          var delBtn = document.createElement('button');
          delBtn.className = 'btn-del';
          delBtn.title = 'O\'chirish';
          delBtn.innerHTML = '<ph-trash weight="bold"></ph-trash>';
          delBtn.addEventListener('click', function () {
            if (!confirm('"' + item.title + '" ni o\'chirishni tasdiqlaysizmi?')) return;
            delBtn.disabled = true;
            delBtn.textContent = '…';
            GH.removeItem('news', item.id, 'content: remove news ' + item.id)
              .then(function () { loadList(); })
              .catch(function (err) { alert('Xatolik: ' + (err.message || err)); delBtn.disabled = false; delBtn.textContent = '🗑'; });
          });

          row.appendChild(meta);
          row.appendChild(delBtn);
          body.appendChild(row);
        });
      })
      .catch(function (err) {
        body.innerHTML = '<div class="list-empty">Yuklashda xatolik: ' + (err.message || err) + '</div>';
      });
  }

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  loadList();
})();
</script>
</body>
</html>

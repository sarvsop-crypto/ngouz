<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sozlamalar - O'zNNTMA A'zo kabineti</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
</head>
<body>
<div class="app">
  <main class="main">
    <div class="page-heading"><h1>Sozlamalar</h1></div>
    <p class="page-sub">Mas'ul shaxs aloqa ma'lumotlari va xabarnoma sozlamalari.</p>

    <div class="grid-2">
      <article class="card">
        <h3>Mas'ul shaxs</h3>
        <div class="filters filters-single">
          <input class="input" placeholder="F.I.Sh." />
          <input class="input" placeholder="Telefon" />
          <input class="input" placeholder="Email" />
          <button class="btn" type="button">Saqlash</button>
        </div>
      </article>

      <article class="card">
        <h3>Xabarnoma</h3>
        <div class="filters filters-single">
          <label><input type="checkbox" checked /> Email orqali xabar olish</label>
          <label><input type="checkbox" checked /> Ariza holati o'zgarsa xabar berish</label>
          <button class="btn" type="button">Saqlash</button>
        </div>
      </article>
    </div>
  </main>
</div>
<script src="js/cabinet-app.js"></script>
</body>
</html>

<body data-nav-active="settings">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Sozlamalar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">

            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial">K</div>
            <div>
              <div class="main__profile-name">Kamolov Sanjar</div>
              <div class="main__profile-role">Yangi Nafas NNT</div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Sozlamalar</h1>
      </div>

      <div class="settings-layout">
        <nav class="settings-side-nav">
          <a href="cabinet-settings.html" class="settings-side-link is-active"><i class="ph ph-user"></i> Profil</a>
          <a href="cabinet-settings-org.html" class="settings-side-link"><i class="ph ph-buildings"></i> Tashkilot</a>

            <div class="settings-grid-two">
              <div><label class="settings-form-label">Ism</label><input class="settings-form-control" type="text" value="Kamolov Sanjar" /></div>
              <div><label class="settings-form-label">Email</label><input class="settings-form-control" type="email" value="kamolov@yanginafas.uz" /></div>
              <div><label class="settings-form-label">Telefon</label><input class="settings-form-control" type="tel" value="+998 90 123 45 67" /></div>
              <div><label class="settings-form-label">Lavozim</label><input class="settings-form-control" type="text" value="Tashkilot rahbari" /></div>
            </div>
            <div class="settings-actions-row">
              <button type="button" class="btn btn--primary"><i class="ph ph-floppy-disk"></i> Saqlash</button>
              <button type="button" class="btn btn--secondary">Bekor qilish</button>
            </div>
          </div>
        </div>
      </div>

  <div id="cabinet-notifications-root"></div>

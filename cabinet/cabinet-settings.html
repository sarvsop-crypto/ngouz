<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sozlamalar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-settings-account.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
</head>
<body data-nav-active="settings">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Sozlamalar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial"></div>
            <div>
              <div class="main__profile-name"></div>
              <div class="main__profile-role"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Sozlamalar</h1>
      </div>

      <div class="settings-layout">
        <nav class="settings-side-nav">
          <a href="cabinet-settings.html" class="settings-side-link is-active"><i class="ph ph-user"></i> Profil</a>
          <a href="cabinet-settings-org.html" class="settings-side-link"><i class="ph ph-buildings"></i> Tashkilot</a>
          <a href="cabinet-settings-security.html" class="settings-side-link"><i class="ph ph-shield-check"></i> Xavfsizlik</a>
          <a href="cabinet-settings-notifications.html" class="settings-side-link"><i class="ph ph-bell"></i> Bildirishnomalar</a>
        </nav>
        <div>
          <div class="settings-panel">
            <h2 class="settings-section-title">Shaxsiy ma&rsquo;lumotlar</h2>
            <div class="settings-grid-two">
              <div><label class="settings-form-label">Ism</label><input id="sName" class="settings-form-control" type="text" value="" /></div>
              <div><label class="settings-form-label">Email</label><input id="sEmail" class="settings-form-control" type="email" value="" disabled /></div>
              <div><label class="settings-form-label">Telefon</label><input id="sPhone" class="settings-form-control" type="tel" value="" /></div>
              <div><label class="settings-form-label">Veb-sayt</label><input id="sWebsite" class="settings-form-control" type="text" value="" /></div>
            </div>
            <p id="sMsg" style="font-size:13px;margin:8px 0 0;display:none"></p>
            <div class="settings-actions-row">
              <button type="button" class="btn btn--primary" id="sSaveBtn"><i class="ph ph-floppy-disk"></i> Saqlash</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="js/cabinet-chrome.js" defer></script>
  <script src="../js/api-client.js"></script>
  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>
  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }
    NgoApi.get('/me').then(function (res) {
      var u = res.user;
      document.getElementById('sName').value  = u.full_name || '';
      document.getElementById('sEmail').value = u.email || '';
    });
    NgoApi.get('/cabinet/organization').then(function (res) {
      var o = res.organization;
      if (o) {
        document.getElementById('sPhone').value   = o.phone || '';
        document.getElementById('sWebsite').value = o.website || '';
      }
    }).catch(function () {});

    document.getElementById('sSaveBtn').addEventListener('click', function () {
      var phone   = document.getElementById('sPhone').value.trim();
      var website = document.getElementById('sWebsite').value.trim();
      var msg = document.getElementById('sMsg');
      this.disabled = true;
      var btn = this;
      NgoApi.patch('/cabinet/organization', { phone: phone, website: website })
        .then(function () { msg.textContent = 'Saqlandi!'; msg.style.color = '#0e7490'; msg.style.display = 'block'; btn.disabled = false; })
        .catch(function () { msg.textContent = 'Xatolik yuz berdi.'; msg.style.color = '#dc2626'; msg.style.display = 'block'; btn.disabled = false; });
    });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ro'yxatdan o'tish — O'zNNTMA Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-auth.page.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__logo">N</div>
      <h1 class="header__title">O&rsquo;zNNTMA</h1>
    </header>

    <main class="main">
      <div class="form-card">
        <div class="form-header">
          <div class="form-header__icon-wrap">
            <div class="form-header__icon-inner">
              <i class="ph ph-user-plus" style="font-size:24px;color:var(--primary-500);"></i>
            </div>
          </div>
          <h2 class="form-header__title">Hisob yaratish</h2>
          <p class="form-header__subtitle">A&rsquo;zolik uchun ariza topshirish va kabinetga kirish uchun ro&rsquo;yxatdan o&rsquo;ting.</p>
        </div>

        <form class="form-fields" id="registerForm" novalidate>
          <div class="field">
            <label class="field__label" for="fullname">To&rsquo;liq ism <span>*</span></label>
            <div class="field__input-wrap">
              <input type="text" id="fullname" class="field__input" name="fullname" placeholder="Ism va familiyangizni kiriting" required autocomplete="name" />
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="org">Tashkilot nomi <span>*</span></label>
            <div class="field__input-wrap">
              <input type="text" id="org" class="field__input" name="org" placeholder="Tashkilotingiz nomini kiriting" required />
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="email">Email manzil <span>*</span></label>
            <div class="field__input-wrap">
              <input type="email" id="email" class="field__input" name="email" placeholder="Email manzilingizni kiriting" required autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="phone">Telefon raqam <span>*</span></label>
            <div class="field__input-wrap">
              <input type="tel" id="phone" class="field__input" name="phone" placeholder="+998 __ ___ __ __" required autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="password">Parol <span>*</span></label>
            <div class="field__input-wrap">
              <input type="password" id="password" class="field__input" name="password" placeholder="Parol yarating" required minlength="8" autocomplete="new-password" />
              <button type="button" class="field__toggle" id="togglePassword" aria-label="Parolni ko'rsatish">
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </div>

          <label class="checkbox-wrap" style="margin-top:4px;">
            <input type="checkbox" name="agree" required />
            <span>
              <a href="#" style="color:var(--primary-500);text-decoration:none;font-weight:500;">Foydalanish shartlari</a> va
              <a href="#" style="color:var(--primary-500);text-decoration:none;font-weight:500;">Maxfiylik siyosati</a>ga roziman
            </span>
          </label>

          <button type="submit" class="btn-auth">
            <i class="ph ph-user-check"></i> Ro&rsquo;yxatdan o&rsquo;tish
          </button>
        </form>

        <p class="form-alt">Hisobingiz bormi? <a href="cabinet-login.html">Kirish</a></p>
      </div>
    </main>

  </div>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 O&rsquo;zNNTMA. Barcha huquqlar himoyalangan.</p>
    <nav class="footer__links">
      <a href="mailto:info@ngo.uz" class="footer__link"><i class="ph ph-envelope"></i> info@ngo.uz</a>
      <a href="#" class="footer__link"><i class="ph ph-shield"></i> Maxfiylik</a>
      <a href="#" class="footer__link"><i class="ph ph-file-text"></i> Shartlar</a>
      <a href="#" class="footer__link"><i class="ph ph-question"></i> Yordam</a>
    </nav>
  </footer>

  <script src="../js/api-client.js"></script>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      var inp = document.getElementById('password');
      var icon = this.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'ph ph-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'ph ph-eye'; }
    });

    if (NgoApi.getToken()) { location.replace('cabinet-dashboard.html'); }

    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name  = document.getElementById('fullname').value.trim();
      var org   = document.getElementById('org').value.trim();
      var email = document.getElementById('email').value.trim();
      var pass  = document.getElementById('password').value;
      if (!name || !org || !email || !pass) { alert('Barcha majburiy maydonlarni to\'ldiring.'); return; }
      if (pass.length < 12) { alert('Parol kamida 12 belgidan iborat bo\'lishi kerak.'); return; }
      var btn = this.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Ro\'yxatdan o\'tilmoqda...';
      fetch('https://api.ngo.uz/v1/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name: name, org_name: org, email: email, password: pass })
      })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (res.ok && res.data.token) {
          try { localStorage.setItem('ngo_api_token', res.data.token); localStorage.setItem('ngo_api_user', JSON.stringify(res.data.user)); } catch(e) {}
          location.replace('cabinet-dashboard.html');
        } else {
          var msg = 'Ro\'yxatdan o\'tishda xatolik.';
          if (res.data.error === 'duplicate_email') msg = 'Bu email allaqachon ro\'yxatdan o\'tgan.';
          if (res.data.error === 'validation') msg = 'Ma\'lumotlarni tekshiring. Parol kamida 12 belgi.';
          alert(msg);
          btn.disabled = false; btn.textContent = 'Ro\'yxatdan o\'tish';
        }
      })
      .catch(function () { alert('Tarmoq xatosi.'); btn.disabled = false; btn.textContent = 'Ro\'yxatdan o\'tish'; });
    });
  </script>
</body>
</html>

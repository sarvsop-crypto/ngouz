<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tashkilot — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-settings-account.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
</head>
<body data-nav-active="settings">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <a href="cabinet-settings.html">Sozlamalar</a> / <span>Tashkilot</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial">K</div>
            <div>
              <div class="main__profile-name">Kamolov Sanjar</div>
              <div class="main__profile-role">Yangi Nafas NNT</div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Sozlamalar</h1>
      </div>

      <div class="settings-layout">
        <nav class="settings-side-nav">
          <a href="cabinet-settings.html" class="settings-side-link"><i class="ph ph-user"></i> Profil</a>
          <a href="cabinet-settings-org.html" class="settings-side-link is-active"><i class="ph ph-buildings"></i> Tashkilot</a>
          <a href="cabinet-settings-security.html" class="settings-side-link"><i class="ph ph-shield-check"></i> Xavfsizlik</a>
          <a href="cabinet-settings-notifications.html" class="settings-side-link"><i class="ph ph-bell"></i> Bildirishnomalar</a>
        </nav>
        <div>
          <div class="settings-panel">
            <h2 class="settings-section-title">Tashkilot ma&rsquo;lumotlari</h2>
            <div class="settings-grid-two">
              <div><label class="settings-form-label">Tashkilot nomi</label><input class="settings-form-control" type="text" value="Yangi Nafas NNT" /></div>
              <div><label class="settings-form-label">INN</label><input class="settings-form-control" type="text" value="302 456 789" /></div>
              <div><label class="settings-form-label">Ro&rsquo;yxatdan o&rsquo;tish raqami</label><input class="settings-form-control" type="text" value="NNT-2024-00312" /></div>
              <div><label class="settings-form-label">Tashkilot turi</label><select class="settings-form-control"><option selected>Nodavlat notijorat tashkiloti</option><option>Jamoat birlashmasi</option><option>Xayriya jamg'armasi</option></select></div>
              <div><label class="settings-form-label">Viloyat</label><select class="settings-form-control"><option selected>Toshkent shahri</option><option>Toshkent viloyati</option><option>Samarqand</option><option>Buxoro</option><option>Namangan</option><option>Andijon</option><option>Farg&rsquo;ona</option></select></div>
              <div><label class="settings-form-label">Manzil</label><input class="settings-form-control" type="text" value="Yunusobod, 7-mavze" /></div>
              <div class="settings-span-2"><label class="settings-form-label">Faoliyat yo&rsquo;nalishi</label><input class="settings-form-control" type="text" value="Ijtimoiy yordam, yoshlar taraqqiyoti" /></div>
              <div class="settings-span-2"><label class="settings-form-label">Veb-sayt</label><input class="settings-form-control" type="url" placeholder="https://example.uz" /></div>
            </div>
            <div class="settings-actions-row">
              <button type="button" class="btn btn--primary"><i class="ph ph-floppy-disk"></i> Saqlash</button>
              <button type="button" class="btn btn--secondary">Bekor qilish</button>
            </div>
          </div>
          <div class="settings-panel">
            <h2 class="settings-section-title settings-section-title--tight">Bank rekvizitlari</h2>
            <p class="settings-section-sub">Grant va moliyaviy operatsiyalar uchun</p>
            <div class="settings-grid-two">
              <div><label class="settings-form-label">Bank nomi</label><input class="settings-form-control" type="text" placeholder="Bank nomi" /></div>
              <div><label class="settings-form-label">Hisob raqami</label><input class="settings-form-control" type="text" placeholder="20208000000000000000" /></div>
              <div><label class="settings-form-label">MFO</label><input class="settings-form-control" type="text" placeholder="00000" /></div>
            </div>
            <div class="settings-actions-row">
              <button type="button" class="btn btn--primary"><i class="ph ph-floppy-disk"></i> Saqlash</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>
</body>
</html>

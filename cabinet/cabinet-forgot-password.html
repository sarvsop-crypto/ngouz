<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kodni tasdiqlash — O’zNNTMA Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-auth.page.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__logo">N</div>
      <h1 class="header__title">O&rsquo;zNNTMA</h1>
    </header>

    <main class="main">
      <div class="form-card">
        <div class="form-header">
          <div class="form-header__icon-wrap">
            <div class="form-header__icon-inner">
              <i class="ph ph-envelope-open" style="font-size:24px;color:var(--primary-500);"></i>
            </div>
          </div>
          <h2 class="form-header__title">Emailingizni tekshiring</h2>
          <p class="form-header__subtitle">Emailingizga 5 xonali tasdiqlash kodi yuborildi. Parolni tiklash uchun uni kiriting.</p>
        </div>

        <form class="form-fields" id="otpForm">
          <div class="otp-inputs" role="group" aria-label="Tasdiqlash kodi">
            <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" id="otp1" aria-label="1-raqam" />
            <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" id="otp2" aria-label="2-raqam" />
            <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" id="otp3" aria-label="3-raqam" />
            <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" id="otp4" aria-label="4-raqam" />
            <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" id="otp5" aria-label="5-raqam" />
          </div>

          <button type="submit" class="btn-auth">
            <i class="ph ph-check-circle"></i> Tasdiqlash
          </button>
        </form>

        <p class="form-alt">Kodni olmadingizmi? <a href="#" id="resendLink">Qayta yuborish</a></p>
        <p class="form-back"><a href="cabinet-login.html"><i class="ph ph-arrow-left"></i> Kirishga qaytish</a></p>
      </div>
    </main>

  </div>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 O&rsquo;zNNTMA. Barcha huquqlar himoyalangan.</p>
    <nav class="footer__links">
      <a href="mailto:info@ngo.uz" class="footer__link"><i class="ph ph-envelope"></i> info@ngo.uz</a>
      <a href="#" class="footer__link"><i class="ph ph-shield"></i> Maxfiylik</a>
      <a href="#" class="footer__link"><i class="ph ph-file-text"></i> Shartlar</a>
      <a href="#" class="footer__link"><i class="ph ph-question"></i> Yordam</a>
    </nav>
  </footer>

  <script>
    (function () {
      var inputs = document.querySelectorAll('.otp-inputs input');
      var form = document.getElementById('otpForm');

      inputs.forEach(function (input) {
        input.addEventListener('input', function () {
          var val = this.value.replace(/\D/g, '');
          this.value = val ? val[0] : '';
          if (val && this.nextElementSibling) this.nextElementSibling.focus();
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && !this.value && this.previousElementSibling)
            this.previousElementSibling.focus();
        });
        input.addEventListener('paste', function (e) {
          e.preventDefault();
          var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 5);
          paste.split('').forEach(function (ch, j) { if (inputs[j]) inputs[j].value = ch; });
          if (paste.length > 0 && inputs[paste.length - 1]) inputs[paste.length - 1].focus();
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var code = Array.prototype.map.call(inputs, function (i) { return i.value; }).join('');
        if (code.length === 5) window.location.href = 'cabinet-create-password.html';
      });
    })();
  </script>
</body>
</html>

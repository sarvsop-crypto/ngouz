<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tadbirlar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-dashboard.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
  <style>
    .event-card{background:var(--grey-0);border:1px solid var(--grey-100);border-radius:12px;padding:20px;display:flex;gap:18px;align-items:flex-start;margin-bottom:12px;transition:box-shadow .15s;}
    .event-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);}
    .event-date-badge{background:var(--primary-500);color:#fff;border-radius:10px;min-width:54px;text-align:center;padding:8px 10px;flex-shrink:0;}
    .event-date-day{font-size:24px;font-weight:700;line-height:1;}
    .event-date-month{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
    .event-detail{font-size:13px;color:var(--grey-500);display:flex;align-items:center;gap:6px;margin-bottom:3px;}
    .event-actions{display:flex;align-items:center;gap:10px;margin-top:12px;}
    .event-card--past{opacity:.6;}
    .event-card--past .event-date-badge{background:var(--grey-300);}
  </style>
</head>
<body data-nav-active="events">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Tadbirlar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial">K</div>
            <div>
              <div class="main__profile-name">Kamolov Sanjar</div>
              <div class="main__profile-role">Yangi Nafas NNT</div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Tadbirlar</h1>
      </div>

      <div class="cards">
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-calendar"></i></div></div><div class="card__body"><div><p class="card__label">Jami</p><p class="card__value">8</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--success"><i class="ph ph-check-circle"></i></div></div><div class="card__body"><div><p class="card__label">Qatnashilgan</p><p class="card__value">3</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--warning"><i class="ph ph-calendar-check"></i></div></div><div class="card__body"><div><p class="card__label">Ro&rsquo;yxatga olingan</p><p class="card__value">2</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-clock"></i></div></div><div class="card__body"><div><p class="card__label">Kelayotgan</p><p class="card__value">3</p></div></div></div>
      </div>

      <div class="tabs" style="margin-bottom:20px;">
        <button type="button" class="tab is-active">Kelayotgan <span class="tab__count">3</span></button>
        <button type="button" class="tab">Ro&rsquo;yxatga olingan <span class="tab__count">2</span></button>
        <button type="button" class="tab">O&rsquo;tib ketgan <span class="tab__count">3</span></button>
      </div>

      <div id="eventsContainer">
        <div style="text-align:center;color:var(--grey-400);padding:32px;">Yuklanmoqda...</div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var months = ['Yan','Fev','Mar','Apr','May','Iyun','Iyul','Avg','Sen','Okt','Noy','Dek'];

    function renderEvent(ev) {
      var d = ev.event_date ? new Date(ev.event_date) : null;
      var day = d ? ('0' + d.getDate()).slice(-2) : '--';
      var mon = d ? months[d.getMonth()] : '---';
      var isPast = d && d < new Date();
      var pastCls = isPast ? ' event-card--past' : '';

      var isOnline = (ev.format === 'online') || (ev.location && /online|zoom|webinar/i.test(ev.location));
      var formatBadge = isOnline
        ? '<span style="background:#e0f2fe;color:#0369a1;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;">Online</span>'
        : '<span style="background:var(--primary-50);color:var(--primary-600);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;">Offline</span>';

      var locationIcon = isOnline ? '<i class="ph ph-monitor"></i>' : '<i class="ph ph-map-pin"></i>';
      var loc = ev.location || (isOnline ? 'Online' : '');

      var timeStr = '';
      if (ev.start_time) timeStr += ev.start_time;
      if (ev.end_time) timeStr += ' \u2013 ' + ev.end_time;

      var capacityStr = '';
      if (ev.capacity) capacityStr = '<i class="ph ph-users"></i> ' + ev.capacity + ' o\u2018rin';

      return '<div class="event-card' + pastCls + '">'
        + '<div class="event-date-badge"><div class="event-date-day">' + day + '</div><div class="event-date-month">' + mon + '</div></div>'
        + '<div style="flex:1;">'
        + '<div style="font-size:15px;font-weight:600;color:var(--grey-900);margin:0 0 6px;">' + (ev.title || '') + '</div>'
        + (loc ? '<div class="event-detail">' + locationIcon + ' ' + loc + '</div>' : '')
        + '<div class="event-detail">'
        + (timeStr ? '<i class="ph ph-clock"></i> ' + timeStr : '')
        + (capacityStr ? ' \u00b7 ' + capacityStr : '')
        + '</div>'
        + (ev.description ? '<div class="event-detail">' + ev.description + '</div>' : '')
        + '</div>'
        + formatBadge
        + '</div>';
    }

    NgoApi.get('https://ngo-api-proxy.sarvsop.workers.dev/v1/public/events?limit=100', { noAuth: true }).then(function (res) {
      var items = res.items || res.data || [];
      var container = document.getElementById('eventsContainer');
      if (!items.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--grey-400);padding:32px;">Tadbirlar topilmadi</div>';
        return;
      }
      container.innerHTML = items.map(renderEvent).join('');

      // Update summary cards
      var now = new Date();
      var upcoming = items.filter(function (e) { return e.event_date && new Date(e.event_date) >= now; });
      var past = items.filter(function (e) { return e.event_date && new Date(e.event_date) < now; });
      var vals = document.querySelectorAll('.cards .card__value');
      if (vals[0]) vals[0].textContent = items.length;
      if (vals[3]) vals[3].textContent = upcoming.length;
    }).catch(function (err) {
      console.error('Events load error:', err);
      document.getElementById('eventsContainer').innerHTML = '<div style="text-align:center;color:var(--error-500);padding:32px;">Xatolik: ' + (err.message || 'Nomalum') + '</div>';
    });
  })();
  </script>
</body>
</html>

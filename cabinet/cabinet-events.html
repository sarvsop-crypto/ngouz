<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tadbirlar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-dashboard.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
  <style>
    .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
    .news-card{background:var(--grey-0);border:1px solid var(--grey-100);border-radius:12px;overflow:hidden;transition:box-shadow .15s;}
    .news-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .news-card__img{height:140px;background:linear-gradient(135deg,var(--primary-100) 0%,var(--primary-200) 100%);display:grid;place-items:center;font-size:40px;color:var(--primary-400);}
    .news-card__img--event{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);color:#d97706;}
    .news-card__body{padding:16px;}
    .news-card__cat{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em;}
    .news-card__cat--news{background:var(--primary-50);color:var(--primary-600);}
    .news-card__cat--event{background:var(--secondary-50,#fff7ed);color:var(--warning-700,#b45309);}
    .news-card__title{font-size:14px;font-weight:600;color:var(--grey-900);margin:0 0 8px;line-height:1.4;}
    .news-card__excerpt{font-size:13px;color:var(--grey-500);margin:0 0 12px;line-height:1.5;}
    .news-card__footer{display:flex;align-items:center;justify-content:space-between;}
    .news-card__date{font-size:12px;color:var(--grey-400);}
    .news-card__link{font-size:13px;color:var(--primary-500);text-decoration:none;}
  </style>
</head>
<body data-nav-active="events">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Tadbirlar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial"></div>
            <div>
              <div class="main__profile-name"></div>
              <div class="main__profile-role"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Tadbirlar</h1>
      </div>

      <div class="cards">
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-calendar"></i></div></div><div class="card__body"><div><p class="card__label">Jami</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--success"><i class="ph ph-check-circle"></i></div></div><div class="card__body"><div><p class="card__label">Qatnashilgan</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--warning"><i class="ph ph-calendar-check"></i></div></div><div class="card__body"><div><p class="card__label">Ro&rsquo;yxatga olingan</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-clock"></i></div></div><div class="card__body"><div><p class="card__label">Kelayotgan</p><p class="card__value">&mdash;</p></div></div></div>
      </div>

      <div class="news-grid" id="eventsContainer">
        <div class="grid-empty-state">Yuklanmoqda...</div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var API = 'https://ngo-api-proxy.sarvsop.workers.dev/v1';
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(d) { if (!d) return ''; var p = d.slice(0,10).split('-'); return p[2] + '.' + p[1] + '.' + p[0]; }

    fetch(API + '/public/events?limit=100')
      .then(function (r) { return r.json(); })
      .then(function (res) {
        var items = res.items || [];
        var container = document.getElementById('eventsContainer');
        if (!items.length) {
          container.innerHTML = '<div class="grid-empty-state">Tadbirlar topilmadi</div>';
          return;
        }

        var now = new Date();
        var upcoming = items.filter(function (e) { return e.date && new Date(e.date) >= now; });
        var past = items.filter(function (e) { return !e.date || new Date(e.date) < now; });

        var vals = document.querySelectorAll('.cards .card__value');
        if (vals[0]) vals[0].textContent = items.length;
        if (vals[1]) vals[1].textContent = past.length;
        if (vals[3]) vals[3].textContent = upcoming.length;

        container.innerHTML = items.map(function (ev) {
          var statusLabel = ev.status === 'upcoming' ? 'KELAYOTGAN' : "BO'LIB O'TGAN";
          var statusClass = ev.status === 'upcoming' ? 'news-card__cat--event' : 'news-card__cat--news';
          var desc = esc(ev.description || '');
          if (desc.length > 120) desc = desc.slice(0, 120) + '...';
          var loc = ev.location ? '<i class="ph ph-map-pin"></i> ' + esc(ev.location) : '';

          return '<div class="news-card">'
            + '<div class="news-card__img news-card__img--event"><i class="ph ph-calendar-blank"></i></div>'
            + '<div class="news-card__body">'
            + '<span class="news-card__cat ' + statusClass + '">' + statusLabel + '</span>'
            + '<h3 class="news-card__title">' + esc(ev.title) + '</h3>'
            + '<p class="news-card__excerpt">' + desc + '</p>'
            + '<div class="news-card__footer">'
            + '<span class="news-card__date">' + fmtDate(ev.date) + (loc ? ' · ' + loc : '') + '</span>'
            + '<a href="../event-detail.html?id=' + ev.id + '" class="news-card__link">Batafsil <i class="ph ph-arrow-right"></i></a>'
            + '</div></div></div>';
        }).join('');
      })
      .catch(function () {
        document.getElementById('eventsContainer').innerHTML = '<div class="grid-empty-state" style="color:var(--error-600);">Xatolik yuz berdi</div>';
      });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hisobotlar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-contracts.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
</head>
<body data-nav-active="reports">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Hisobotlar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial"></div>
            <div>
              <div class="main__profile-name"></div>
              <div class="main__profile-role"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Hisobotlar</h1>
        <div class="main__btns">
          <button type="button" class="btn btn--primary" data-modal-open="uploadReportModal"><i class="ph ph-upload-simple"></i> Hisobot yuklash</button>
        </div>
      </div>

      <div class="cards">
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-chart-bar"></i></div></div><div class="card__body"><div><p class="card__label">Jami hisobotlar</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--success"><i class="ph ph-check-circle"></i></div></div><div class="card__body"><div><p class="card__label">Tasdiqlangan</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--warning"><i class="ph ph-clock"></i></div></div><div class="card__body"><div><p class="card__label">Ko&rsquo;rib chiqilmoqda</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon" style="background:var(--error-50);color:var(--error-600);"><i class="ph ph-x-circle"></i></div></div><div class="card__body"><div><p class="card__label">Qaytarilgan</p><p class="card__value">&mdash;</p></div></div></div>
      </div>

      <div id="reportsRejAlert" class="reports-rej-alert">
        <i class="ph ph-warning reports-rej-alert__icon"></i>
        <div>
          <div id="reportsRejTitle" class="reports-rej-alert__title"></div>
          <div id="reportsRejBody" class="reports-rej-alert__body"></div>
        </div>
      </div>

      <section class="table-section">
        <div class="table-section__head">
          <h2 class="table-section__title">Hisobotlar tarixi</h2>
          <div class="table-section__filters">
            <button type="button" class="filter-chip is-active">Hammasi</button>
            <button type="button" class="filter-chip">Yillik</button>
            <button type="button" class="filter-chip">Choraklik</button>
          </div>
        </div>
        <table class="table">
          <thead>
            <tr><th>Hisobot nomi</th><th>Turi</th><th>Davr</th><th>Topshirilgan</th><th>Holat</th><th>Amal</th></tr>
          </thead>
          <tbody id="reportsTableBody">
            <tr><td colspan="6" class="empty-state">Yuklanmoqda...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div class="modal" id="uploadReportModal" role="dialog" aria-label="Hisobot yuklash" aria-modal="true" aria-hidden="true">
    <div class="modal__backdrop" data-modal-close="uploadReportModal"></div>
    <div class="modal__panel" style="max-width:480px;">
      <div class="modal__head">
        <h2 class="modal__title">Hisobot yuklash</h2>
        <button type="button" class="modal__close" data-modal-close="uploadReportModal" aria-label="Yopish"><i class="ph ph-x"></i></button>
      </div>
      <div class="modal__body">
        <div style="display:grid;gap:14px;">
          <div><label class="form-label-sm">Hisobot turi</label><select class="field__input"><option value="">Turini tanlang</option><option>Yillik faoliyat hisoboti</option><option>Moliyaviy hisobot</option><option>Choraklik hisobot</option><option>Boshqa</option></select></div>
          <div><label class="form-label-sm">Davr</label><select class="field__input"><option>Joriy yil &mdash; I chorak</option><option>Joriy yil &mdash; Yillik</option><option>O&rsquo;tgan yil &mdash; IV chorak</option><option>O&rsquo;tgan yil &mdash; III chorak (qayta)</option></select></div>
          <div><label class="form-label-sm">Fayl (PDF, DOCX &mdash; maks. 20 MB)</label><input type="file" class="field__input" accept=".pdf,.doc,.docx" /></div>
          <div><label class="form-label-sm">Izoh (ixtiyoriy)</label><textarea class="field__input" rows="3" placeholder="Qo'shimcha ma'lumot..."></textarea></div>
        </div>
      </div>
      <div class="modal__foot">
        <button type="button" class="btn btn--secondary" data-modal-close="uploadReportModal">Bekor qilish</button>
        <button type="button" class="btn btn--primary"><i class="ph ph-upload-simple"></i> Yuborish</button>
      </div>
    </div>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var statusMap = {
      approved: { label: 'Tasdiqlangan', cls: 'badge--success' },
      pending:  { label: "Ko\u2018rib chiqilmoqda", cls: 'badge--warning' },
      rejected: { label: 'Qaytarilgan', cls: 'badge--error' },
      draft:    { label: 'Qoralama', cls: 'badge--pending' }
    };

    function fmtDate(iso) {
      if (!iso) return '\u2014';
      var d = new Date(iso);
      return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2) + '.' + d.getFullYear();
    }

    function fileIcon(path) {
      if (!path) return '<i class="ph ph-file-text file-icon-inline" style="color:var(--grey-400);"></i>';
      if (/\.pdf$/i.test(path)) return '<i class="ph ph-file-pdf file-icon-inline" style="color:var(--error-500);"></i>';
      return '<i class="ph ph-file-text file-icon-inline" style="color:var(--grey-400);"></i>';
    }

    function renderRow(r) {
      var s = statusMap[r.status] || statusMap.pending;
      var isDanger = r.status === 'rejected';
      var actionBtn = isDanger
        ? '<button type="button" class="btn btn--sm btn--primary" data-modal-open="uploadReportModal"><i class="ph ph-upload-simple"></i> Qayta yuklash</button>'
        : '<button type="button" class="btn btn--sm btn--secondary"><i class="ph ph-eye"></i> Ko\u2018rish</button>';
      return '<tr' + (isDanger ? ' class="table-row-danger"' : '') + '>'
        + '<td>' + (isDanger ? '<i class="ph ph-warning file-icon-inline" style="color:var(--error-500);"></i>' : fileIcon(r.file_path)) + (r.title || '') + '</td>'
        + '<td>' + (r.period || '') + '</td>'
        + '<td>' + (r.period || '') + '</td>'
        + '<td>' + fmtDate(r.created_at) + '</td>'
        + '<td><span class="badge ' + s.cls + '"><span class="badge__dot"></span>' + s.label + '</span></td>'
        + '<td>' + actionBtn + '</td>'
        + '</tr>';
    }

    NgoApi.get('/cabinet/reports', { loginPage: 'cabinet-login.html' }).then(function (res) {
      var items = res.items || [];
      var tbody = document.getElementById('reportsTableBody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Hisobotlar topilmadi</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(renderRow).join('');

      // Update summary cards
      var total = items.length;
      var approved = items.filter(function (i) { return i.status === 'approved'; }).length;
      var pending = items.filter(function (i) { return i.status === 'pending'; }).length;
      var rejected = items.filter(function (i) { return i.status === 'rejected'; }).length;
      var vals = document.querySelectorAll('.cards .card__value');
      if (vals[0]) vals[0].textContent = total;
      if (vals[1]) vals[1].textContent = approved;
      if (vals[2]) vals[2].textContent = pending;
      if (vals[3]) vals[3].textContent = rejected;

      // Show rejection alert if any rejected
      var rejItem = items.find(function (i) { return i.status === 'rejected'; });
      var alertBox = document.getElementById('reportsRejAlert');
      if (alertBox && rejItem) {
        alertBox.style.display = 'flex';
        var titleEl = document.getElementById('reportsRejTitle');
        var bodyEl = document.getElementById('reportsRejBody');
        if (titleEl) titleEl.textContent = (rejItem.title || 'Hisobot') + ' qaytarilgan';
        if (bodyEl) bodyEl.textContent = rejItem.review_note ? ('Sababli: ' + rejItem.review_note) : '';
      }
    }).catch(function (err) {
      console.error('Reports load error:', err);
      var tbody = document.getElementById('reportsTableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state" style="color:var(--error-500);">Xatolik: ' + (err.message || 'Nomalum xato') + '</td></tr>';
    });

    // Wire modal submit button
    var modal = document.getElementById('uploadReportModal');
    if (modal) {
      var submitBtn = modal.querySelector('.modal__foot .btn--primary');
      if (submitBtn) {
        submitBtn.addEventListener('click', function () {
          var selects = modal.querySelectorAll('select');
          var fileInput = modal.querySelector('input[type="file"]');
          var textarea = modal.querySelector('textarea');
          var title = selects[0] ? selects[0].value : '';
          var period = selects[1] ? selects[1].value : '';
          var note = textarea ? textarea.value : '';
          if (!title) { alert('Hisobot turini tanlang'); return; }
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="ph ph-spinner"></i> Yuborilmoqda...';

          var token = '';
          try { token = localStorage.getItem('ngo_api_token') || ''; } catch(e) {}
          var authHeaders = token ? { 'Authorization': 'Bearer ' + token } : {};

          // If file selected, upload first then create report with path
          var file = fileInput && fileInput.files.length ? fileInput.files[0] : null;
          var uploadPromise;
          if (file) {
            var formData = new FormData();
            formData.append('file', file);
            formData.append('type', 'report');
            uploadPromise = fetch('https://ngo-api-proxy.sarvsop.workers.dev/v1/admin/upload', {
              method: 'POST',
              headers: authHeaders,
              body: formData
            }).then(function (r) { return r.json(); }).then(function (d) { return d.path || d.file_path || ''; });
          } else {
            uploadPromise = Promise.resolve('');
          }

          uploadPromise.then(function (filePath) {
            return NgoApi.post('/cabinet/reports', {
              title: title,
              period: period,
              file_path: filePath,
              note: note,
              submit: true
            }, { loginPage: 'cabinet-login.html' });
          }).then(function () {
            location.reload();
          }).catch(function (err) {
            alert('Xatolik: ' + (err.message || 'Nomalum'));
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="ph ph-upload-simple"></i> Yuborish';
          });
        });
      }
    }
  })();
  </script>
</body>
</html>

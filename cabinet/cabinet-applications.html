<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A'zolik arizasi - O'zNNTMA A'zo kabineti</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
</head>
<body>
<div class="app">
  <main class="main">
    <div class="page-heading"><h1>A'zolik arizasi</h1></div>
    <p class="page-sub">Faqat a'zolik uchun ariza va shartnoma holati ko'rsatiladi.</p>

    <article class="card">
      <h3>Ariza holati</h3>
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>Ariza</th><th>Sana</th><th>Holat</th><th>Izoh</th></tr></thead>
          <tbody>
            <tr><td><strong>ARZ-2026-0418</strong></td><td>02.04.2026</td><td><span class="badge warn">Ko'rib chiqilmoqda</span></td><td>Hujjatlar tekshirilmoqda</td></tr>
          </tbody>
        </table>
      </div>
    </article>

    <article class="card mt-12">
      <h3>Yangi ariza</h3>
      <div class="filters filters-single">
        <input class="input" placeholder="Tashkilot nomi" />
        <input class="input" placeholder="STIR" />
        <button class="btn" type="button">Arizani yuborish</button>
      </div>
    </article>
  </main>
</div>
<script src="js/cabinet-app.js"></script>
</body>
</html>

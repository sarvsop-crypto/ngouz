<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ariza holati — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-approvals.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
</head>
<body data-nav-active="applications">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Ariza holati</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial"></div>
            <div>
              <div class="main__profile-name"></div>
              <div class="main__profile-role"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="page-header">
        <h1 class="page-header__title">Ariza holati</h1>
        <p class="page-header__desc">A&rsquo;zolik arizangizning joriy holati va bosqichlari.</p>
      </div>

      <div class="tabs">
        <button type="button" class="tab is-active">Faol <span class="tab__count">&mdash;</span></button>
        <button type="button" class="tab">Tasdiqlangan <span class="tab__count">&mdash;</span></button>
        <button type="button" class="tab">Arxiv <span class="tab__count">&mdash;</span></button>
      </div>

      <div class="cards">
        <div class="card"><div class="card__head"><div class="card__icon card__icon--warning"><i class="ph ph-clock"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Joriy holat</p><p class="card__value" style="font-size:16px;color:var(--warning-700);">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-steps"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Bosqich</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-files"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Hujjatlar</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-calendar"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Topshirilgan</p><p class="card__value" style="font-size:16px;">&mdash;</p></div></div></div>
      </div>

      <!-- Application steps - hidden until API data is loaded -->
      <div id="appStepsSection" style="background:var(--grey-0);border:1px solid var(--grey-100);border-radius:12px;padding:24px;margin-bottom:16px;display:none;">
        <h2 style="font-size:16px;font-weight:600;margin:0 0 20px;">Ariza bosqichlari</h2>
        <div style="text-align:center;color:var(--grey-400);font-size:13px;padding:16px 0;">Ariza ma'lumotlari yuklanmoqda...</div>
      </div>

      <section class="table-section">
        <div class="table-section__head"><h2 class="table-section__title">Ariza tarixi</h2></div>
        <table class="table">
          <thead><tr><th>Tadbir</th><th>Tavsif</th><th>Sana</th><th>Kim tomonidan</th><th>Holat</th></tr></thead>
          <tbody id="applicationsTableBody">
            <tr><td colspan="5" style="text-align:center;color:var(--grey-400);padding:32px;">Yuklanmoqda...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    var statusMap = {
      approved:  { label: 'Tasdiqlangan', cls: 'badge--success' },
      pending:   { label: "Ko\u2018rib chiqilmoqda", cls: 'badge--warning' },
      rejected:  { label: 'Rad etilgan', cls: 'badge--error' },
      submitted: { label: 'Yuborildi', cls: 'badge--success' },
      review:    { label: 'Tekshiruvda', cls: 'badge--warning' },
      document_requested: { label: 'Hujjat kutilmoqda', cls: 'badge--warning' },
      signing:   { label: 'Imzo kutilmoqda', cls: 'badge--pending' }
    };

    function fmtDate(iso) {
      if (!iso) return '\u2014';
      var d = new Date(iso);
      return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2) + '.' + d.getFullYear();
    }

    function renderRow(a) {
      var s = statusMap[a.status] || statusMap.pending;
      return '<tr>'
        + '<td style="display:flex;align-items:center;gap:6px;"><i class="ph ph-clipboard-text"></i> ' + (a.org_name || 'Ariza') + '</td>'
        + '<td>' + (a.review_note || a.status || '') + '</td>'
        + '<td>' + fmtDate(a.created_at) + '</td>'
        + '<td>\u2014</td>'
        + '<td><span class="badge ' + s.cls + '"><span class="badge__dot"></span>' + s.label + '</span></td>'
        + '</tr>';
    }

    NgoApi.get('/cabinet/membership', { loginPage: 'cabinet-login.html' }).then(function (res) {
      var items = res.items || [];
      var tbody = document.getElementById('applicationsTableBody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--grey-400);padding:32px;">Arizalar topilmadi</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(renderRow).join('');

      // Update summary cards
      var active = items.filter(function (i) { return i.status !== 'approved' && i.status !== 'rejected'; });
      var approved = items.filter(function (i) { return i.status === 'approved'; });
      var tabs = document.querySelectorAll('.tabs .tab .tab__count');
      if (tabs[0]) tabs[0].textContent = active.length;
      if (tabs[1]) tabs[1].textContent = approved.length;

      // Update the status card with latest application
      var latest = items[0];
      if (latest) {
        var sInfo = statusMap[latest.status] || statusMap.pending;
        var statusVal = document.querySelector('.cards .card__value');
        if (statusVal) statusVal.textContent = sInfo.label;
        // Update date card
        var dateVal = document.querySelectorAll('.cards .card__value');
        if (dateVal[3]) dateVal[3].textContent = fmtDate(latest.created_at);
      }
    }).catch(function (err) {
      console.error('Applications load error:', err);
      document.getElementById('applicationsTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--error-500);padding:32px;">Xatolik: ' + (err.message || 'Nomalum') + '</td></tr>';
    });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hujjatlar — A'zo Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-documents.page.css">
  <link rel="stylesheet" href="../css/pacta-sidebar.css">
  <link rel="stylesheet" href="../css/pacta-topbar.css">
  <link rel="stylesheet" href="../css/pacta-notifications.css">
  <link rel="stylesheet" href="../css/pacta-app.css">
  <link rel="stylesheet" href="../css/pacta-modal.css">
  <link rel="stylesheet" href="../css/pacta-foundation.css">
</head>
<body data-nav-active="documents">
  <div class="layout">
    <div id="cabinet-sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumbs"><a href="cabinet-dashboard.html">Bosh sahifa</a> / <span>Hujjatlar</span></div>
        </div>
        <div class="topbar-right">
          <div class="topbar-notifications">
            <button type="button" class="topbar-notifications-btn" id="notificationsBtn" aria-label="Bildirishnomalar" aria-expanded="false" aria-haspopup="true"><i class="ph ph-bell"></i></button>
            <span class="topbar-notifications-badge" aria-hidden="true"></span>
          </div>
          <div class="topbar-divider" aria-hidden="true"></div>
          <div class="main__profile">
            <div class="main__profile-avatar u-profile-avatar-initial"></div>
            <div>
              <div class="main__profile-name"></div>
              <div class="main__profile-role"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="main__header">
        <h1 class="main__title">Hujjatlar</h1>
        <div class="main__btns">
          <button type="button" class="btn btn--primary" data-action="upload-doc"><i class="ph ph-upload-simple"></i> Hujjat yuklash</button>
        </div>
      </div>

      <div class="cards">
        <div class="card"><div class="card__head"><div class="card__icon card__icon--success"><i class="ph ph-check-circle"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Tasdiqlangan</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon card__icon--warning"><i class="ph ph-warning"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Muddatli</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-clock"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Kutilmoqda</p><p class="card__value">&mdash;</p></div></div></div>
        <div class="card"><div class="card__head"><div class="card__icon"><i class="ph ph-files"></i></div><span class="card__info"><i class="ph ph-info"></i></span></div><div class="card__body"><div><p class="card__label">Jami</p><p class="card__value">&mdash;</p></div></div></div>
      </div>

      <div class="doc-progress-card">
        <div class="doc-progress-row">
          <div class="doc-progress-chart">
            <svg width="100" height="100" viewBox="0 0 120 120">
              <!-- C=2π×45≈283. 3 gaps×4=12. Available=271. Segs: 3/7×271≈116, 1/7×271≈39, 3/7×271≈116 -->
              <circle cx="60" cy="60" r="45" fill="none" stroke="#e5e7eb" stroke-width="10"/>
              <circle cx="60" cy="60" r="45" fill="none" stroke="#059669" stroke-width="10" stroke-dasharray="116 167" stroke-linecap="butt" transform="rotate(-90 60 60)"/>
              <circle cx="60" cy="60" r="45" fill="none" stroke="var(--secondary-500)" stroke-width="10" stroke-dasharray="39 244" stroke-linecap="butt" transform="rotate(63 60 60)"/>
              <circle cx="60" cy="60" r="45" fill="none" stroke="#94a3b8" stroke-width="10" stroke-dasharray="116 167" stroke-linecap="butt" transform="rotate(118 60 60)"/>
              <text x="60" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="var(--grey-900)" id="docChartPct">—</text>
              <text x="60" y="70" text-anchor="middle" font-size="9" fill="var(--grey-400)">to&apos;liq</text>
            </svg>
          </div>
          <div>
            <div class="doc-progress-title">Yuklanmoqda...</div>
            <div class="doc-progress-sub"></div>
            <div class="doc-progress-legend" id="docProgressLegend">
              <span class="doc-progress-legend-item"><span class="doc-progress-dot u-bg-green-600"></span>Tasdiqlangan: &mdash;</span>
              <span class="doc-progress-legend-item"><span class="doc-progress-dot u-bg-secondary-500"></span>Muddatli: &mdash;</span>
              <span class="doc-progress-legend-item"><span class="doc-progress-dot u-bg-grey-500"></span>Kutilmoqda: &mdash;</span>
            </div>
          </div>
        </div>
      </div>

      <section class="table-section">
        <div class="table-section__head">
          <h2 class="table-section__title">Hujjatlar to&rsquo;plami</h2>
          <div class="table-section__tools">
            <input type="search" class="table-section__search" placeholder="Qidirish..." aria-label="Qidirish" />
          </div>
        </div>
        <table class="table">
          <thead><tr><th>Hujjat nomi</th><th>Turi</th><th>Muddat</th><th>Holat</th><th>Amal</th></tr></thead>
          <tbody id="documentsTableBody">
            <tr><td colspan="5" class="empty-state">Yuklanmoqda...</td></tr>
          </tbody>
        </table>
      </section>

      <div class="doc-upload-panel">
        <h2 class="doc-upload-title"><i class="ph ph-upload-simple"></i> Yangi hujjat yuklash</h2>
        <div class="doc-upload-grid">
          <div>
            <label class="doc-form-label">Hujjat turi</label>
            <select class="doc-form-control">
              <option value="">Hujjat turini tanlang</option>
              <option>Ustav yangi tahrir (2026-yil)</option>
              <option>Soliq organidan ma&rsquo;lumotnoma</option>
              <option>Tashkilot nizomi</option>
              <option>Boshqa hujjat</option>
            </select>
          </div>
          <div>
            <label class="doc-form-label">Fayl (PDF, DOC &mdash; maks. 10 MB)</label>
            <input class="doc-form-control" type="file" accept=".pdf,.doc,.docx" />
          </div>
        </div>
        <div class="doc-upload-actions">
          <button type="button" class="btn btn--primary"><i class="ph ph-upload-simple"></i> Yuklash</button>
        </div>
      </div>
    </main>
  </div>

  <div id="cabinet-notifications-root"></div>

  <script src="../js/api-client.js"></script>
  <script src="js/cabinet-chrome.js" defer></script>

  <script src="../js/pacta-foundation.js" defer></script>
  <script src="../js/pacta-notifications.js"></script>
  <script src="../js/pacta-app.js"></script>

  <script>
  (function () {
    if (!NgoApi.getToken()) { location.replace('cabinet-login.html'); return; }

    function fmtDate(iso) {
      if (!iso) return '\u2014';
      var d = new Date(iso);
      return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2) + '.' + d.getFullYear();
    }

    function fileIcon(path) {
      if (!path) return '<i class="ph ph-file-text"></i>';
      if (/\.pdf$/i.test(path)) return '<i class="ph ph-file-pdf"></i>';
      if (/\.docx?$/i.test(path)) return '<i class="ph ph-file-doc"></i>';
      return '<i class="ph ph-file-text"></i>';
    }

    function renderRow(doc) {
      var hasFile = doc.file_path || doc.file_url;
      var titleCell = hasFile
        ? '<a href="' + (doc.file_url || doc.file_path || '#') + '" class="doc-link" target="_blank">' + fileIcon(doc.file_path) + ' ' + (doc.title || '') + '</a>'
        : '<i class="ph ph-clock"></i> ' + (doc.title || '');

      var category = doc.category || doc.type || '\u2014';

      var statusBadge = '';
      if (doc.status === 'approved') statusBadge = '<span class="badge badge--success"><span class="badge__dot"></span>Tasdiqlangan</span>';
      else if (doc.status === 'pending') statusBadge = '<span class="badge badge--pending"><span class="badge__dot"></span>Kutilmoqda</span>';
      else if (doc.status === 'urgent') statusBadge = '<span class="badge badge--warning"><span class="badge__dot"></span>Muddatli</span>';
      else if (doc.status === 'rejected') statusBadge = '<span class="badge badge--error"><span class="badge__dot"></span>Rad etilgan</span>';
      else statusBadge = '<span class="badge badge--pending"><span class="badge__dot"></span>' + (doc.status || 'Noaniq') + '</span>';

      var actionBtn = hasFile
        ? '<button type="button" class="btn btn--sm btn--secondary"><i class="ph ph-eye"></i> Ko\u2018rish</button>'
        : '<button type="button" class="btn btn--sm btn--secondary"><i class="ph ph-upload-simple"></i> Yuklash</button>';

      var rowCls = doc.status === 'urgent' ? ' class="table-row-warning"' : '';

      return '<tr' + rowCls + '>'
        + '<td>' + titleCell + '</td>'
        + '<td>' + category + '</td>'
        + '<td>' + fmtDate(doc.deadline || doc.created_at) + '</td>'
        + '<td>' + statusBadge + '</td>'
        + '<td>' + actionBtn + '</td>'
        + '</tr>';
    }

    // Cabinet documents shows THIS user's org documents (not public docs)
    // Empty state for new users — documents appear when admin uploads or user submits
    (function () {
      var items = [];
      var tbody = document.getElementById('documentsTableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">'
        + '<i class="ph ph-files empty-icon"></i>'
        + 'Tashkilot hujjatlari hali yuklanmagan.<br>Ustav, guvohnoma va boshqa hujjatlarni yuklash uchun "Hujjat yuklash" tugmasini bosing.'
        + '</td></tr>';

      // Update summary cards
      var approved = items.filter(function (d) { return d.status === 'approved'; }).length;
      var urgent = items.filter(function (d) { return d.status === 'urgent'; }).length;
      var pending = items.filter(function (d) { return d.status === 'pending' || !d.status; }).length;
      var vals = document.querySelectorAll('.cards .card__value');
      if (vals[0]) vals[0].textContent = '0';
      if (vals[1]) vals[1].textContent = '0';
      if (vals[2]) vals[2].textContent = '0';
      if (vals[3]) vals[3].textContent = '0';
    })();
  })();
  </script>
</body>
</html>

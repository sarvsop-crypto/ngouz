<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shartnoma hujjatlari - O'zNNTMA A'zo kabineti</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
</head>
<body>
<div class="app">
  <main class="main">
    <div class="page-heading"><h1>Shartnoma hujjatlari</h1></div>
    <p class="page-sub">A'zolik shartnomasi uchun kerakli hujjatlar va imzo holati.</p>

    <div class="grid-2">
      <article class="card">
        <h3>Yuklash</h3>
        <div class="filters filters-single">
          <input class="input" type="file" />
          <button class="btn" type="button">Yuklash</button>
        </div>
      </article>

      <article class="card">
        <h3>Holat</h3>
        <ul class="event-list list-reset">
          <li class="event-item"><h4>Ustav.pdf</h4><p>Tasdiqlangan</p></li>
          <li class="event-item"><h4>Guvohnoma.pdf</h4><p>Tasdiqlangan</p></li>
          <li class="event-item"><h4>Shartnoma.pdf</h4><p>Imzo kutilmoqda</p></li>
        </ul>
      </article>
    </div>
  </main>
</div>
<script src="js/cabinet-app.js"></script>
</body>
</html>

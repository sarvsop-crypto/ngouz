<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parolni tiklash — O'zNNTMA Kabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="../css/pacta-tokens.css">
  <link rel="stylesheet" href="../css/pacta-auth.page.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__logo">N</div>
      <h1 class="header__title">O&rsquo;zNNTMA</h1>
    </header>

    <main class="main">
      <div class="form-card">
        <div class="form-header">
          <div class="form-header__icon-wrap">
            <div class="form-header__icon-inner">
              <i class="ph ph-envelope-simple" style="font-size:24px;color:var(--primary-500);"></i>
            </div>
          </div>
          <h2 class="form-header__title">Parolni unutdingizmi?</h2>
          <p class="form-header__subtitle">Email manzilingizni kiriting, parolni tiklash uchun tasdiqlash kodi yuboramiz.</p>
        </div>

        <form class="form-fields" action="cabinet-forgot-password.html" method="get">
          <div class="field">
            <label class="field__label" for="email">Email manzil <span>*</span></label>
            <div class="field__input-wrap">
              <input type="email" id="email" class="field__input" name="email" placeholder="Email manzilingizni kiriting" required autocomplete="email" />
            </div>
          </div>

          <button type="submit" class="btn-auth">
            <i class="ph ph-paper-plane-right"></i> Tasdiqlash kodini yuborish
          </button>
        </form>

        <p class="form-alt">Parolni eslading? <a href="cabinet-login.html">Kirishga qaytish</a></p>
      </div>
    </main>

  </div>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 O&rsquo;zNNTMA. Barcha huquqlar himoyalangan.</p>
    <nav class="footer__links">
      <a href="mailto:info@ngo.uz" class="footer__link"><i class="ph ph-envelope"></i> info@ngo.uz</a>
      <a href="#" class="footer__link"><i class="ph ph-shield"></i> Maxfiylik</a>
      <a href="#" class="footer__link"><i class="ph ph-file-text"></i> Shartlar</a>
      <a href="#" class="footer__link"><i class="ph ph-question"></i> Yordam</a>
    </nav>
  </footer>
</body>
</html>
